<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- css leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <!-- js leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    <title>Leaflet avec API</title>
</head>
<style>
    #map{
        height: 680px;
    }
    /* #loader{
        position: absolute;
        top: 10px;
        left: 10px;
        background: #fff;
        padding: 8px;
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
    } */
    .recherche{
        background: #fff;
        padding: 60px 20px;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    #resu_rech{
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
        padding: 10px;
    }
    a{
        cursor: pointer;
    }
    .loader {
        position: absolute;
        top: 49%;
        right: 12px;
        width: 26px;
        height: 26px;
        border-radius: 50px;
        border: 3px solid #ccc;
        border-top: 3px solid #007bff;
        transform: translateY(-50%);
        animation: spin 0.8s linear infinite;
        display: none; /*caché par défaut */
    }

    @keyframes spin {
        0% { 
            transform: translateY(-50%) rotate(0deg);
        }
        100% { 
            transform: translateY(-50%) rotate(360deg);
        }
    }
    .distance{
        background: rgb(169, 75, 75);
        padding: 10px 30px;
        border-radius: 10px;
        color: #fff;
        display: none;
    }
</style>
<body>

    <div class="container-fluid my-3">
        <!-- Loader (stand-by) -->
        <div class="row">
            <div class="col-lg-3 recherche">
                <div class="distance mb-3">12 mètres</div>
                <form action="" class="form" style="position: relative;">
                    <div id="loader" class="loader"></div>
                    <input type="text" id="rech" class="form-control" placeholder="Rechercher">
                </form>
            </div>
            <div class="col-lg-9">
                <div id="map"></div>
            </div>
        </div>        
    </div>


    <!-- <div id="loader" style="display: none;">
        Chargement
    </div> -->


    <!-- js leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
